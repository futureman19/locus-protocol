name: Testnet Deployment

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "core/**"
      - "node/**"
      - "testnet/**"
      - "specs/02-city-lifecycle.md"
      - "specs/03-staking-economics.md"
      - ".github/workflows/testnet-deployment.yml"

jobs:
  testnet:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.17.3"
          otp-version: "27.1"

      - name: Install Core Dependencies
        working-directory: core
        run: |
          mix deps.get
          mix compile

      - name: Install Node Dependencies
        working-directory: node
        run: |
          mix deps.get
          mix compile

      - name: Run Core Validation Tests
        working-directory: core
        run: mix test

      - name: Run Node Validation Tests
        working-directory: node
        run: mix test

      - name: Deploy Local Testnet
        run: bash testnet/scripts/deploy_testnet.sh

      - name: Validate Fixture Scenario
        run: bash testnet/scripts/validate_testnet.sh

      - name: Upload Testnet Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: testnet-runtime
          path: testnet/runtime

      - name: Cleanup Local Testnet
        if: always()
        run: bash testnet/scripts/cleanup_testnet.sh
