version: "3.8"

services:
  postgres:
    image: postgis/postgis:16-3.4-alpine
    environment:
      POSTGRES_USER: locus
      POSTGRES_PASSWORD: locus
      POSTGRES_DB: locus_indexer
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U locus -d locus_indexer"]
      interval: 5s
      timeout: 5s
      retries: 5

  indexer:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://locus:locus@postgres:5432/locus_indexer
      JUNGLEBUS_URL: https://junglebus.gorillapool.io
      NETWORK: mainnet
      PORT: 3000
      LOG_LEVEL: info
    ports:
      - "3000:3000"

volumes:
  pgdata:
